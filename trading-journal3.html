<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trading Journal">
<title>Trading Journal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f; --surface:#0f1318; --surface2:#161c23;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --accent:#00d4aa; --red:#ff4d6d; --green:#00d4aa;
  --yellow:#fbbf24; --blue:#3b82f6;
  --text:#f0f4f8; --muted:#5a6a7a; --muted2:#8a9ab0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;font-size:14px;}
#app{height:100vh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;}
#content{flex:1;overflow-y:auto;padding:0 0 80px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{display:none;}
nav{position:absolute;bottom:0;left:0;right:0;background:rgba(8,11,15,0.97);border-top:1px solid var(--border2);display:flex;padding:8px 0 max(12px,env(safe-area-inset-bottom));backdrop-filter:blur(20px);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;transition:color 0.2s;padding:4px 0;}
.nb .ico{font-size:20px;line-height:1;}
.nb.on{color:var(--accent);}
.hdr{padding:max(44px,env(safe-area-inset-top)) 16px 14px;background:radial-gradient(ellipse at 50% -20%,rgba(0,212,170,0.08) 0%,transparent 70%);}
.hdr-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.01em;}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.card{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;}
.ct{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:12px;}
.ct-red{color:var(--red);}
.fl{font-size:12px;color:var(--muted2);margin-bottom:5px;display:block;font-weight:500;}
.fg{margin-bottom:12px;}
textarea,input[type=text],input[type=date],input[type=time],input[type=number],input[type=week],select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:"DM Sans",sans-serif;resize:none;line-height:1.5;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
textarea:focus,input:focus,select:focus{border-color:rgba(0,212,170,0.4);}
select option{background:var(--surface2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn{padding:12px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.04em;display:inline-block;text-align:center;}
.btn:active{transform:scale(0.97);}
.btn-p{background:linear-gradient(135deg,var(--accent),#00a882);color:#080b0f;}
.btn-r{background:rgba(255,77,109,0.15);border:1px solid rgba(255,77,109,0.3);color:var(--red);}
.btn-g{background:var(--surface2);border:1px solid var(--border);color:var(--muted2);}
.btn-w{width:100%;}
.btn-sm{padding:7px 12px;font-size:11px;}
.dir-row{display:flex;gap:8px;margin-bottom:12px;}
.dir-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all 0.15s;text-align:center;color:var(--muted2);}
.dir-l{background:rgba(0,212,170,0.12);border-color:rgba(0,212,170,0.4);color:var(--green);}
.dir-s{background:rgba(255,77,109,0.12);border-color:rgba(255,77,109,0.4);color:var(--red);}
.srow{display:flex;gap:8px;margin:0 14px 10px;}
.sbox{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.sval{font-size:18px;font-weight:700;font-family:"DM Mono",monospace;}
.slbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;}
.pcard-l{border-left:3px solid var(--green);}
.pcard-s{border-left:3px solid var(--red);}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.pticker{font-size:15px;font-weight:700;font-family:"DM Mono",monospace;}
.pbadge{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;text-transform:uppercase;margin-left:6px;}
.pb-l{background:rgba(0,212,170,0.15);color:var(--green);}
.pb-s{background:rgba(255,77,109,0.15);color:var(--red);}
.pb-o{background:rgba(59,130,246,0.15);color:var(--blue);}
.pb-c{background:rgba(90,106,122,0.15);color:var(--muted2);}
.pb-t{background:rgba(139,92,246,0.15);color:#a78bfa;}
.pb-i{background:rgba(251,191,36,0.15);color:var(--yellow);}
.pmeta{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.pm{font-size:11px;color:var(--muted);}
.pmv{color:var(--muted2);font-weight:500;font-family:"DM Mono",monospace;}
.pnl-pos{color:var(--green);font-weight:700;font-family:"DM Mono",monospace;}
.pnl-neg{color:var(--red);font-weight:700;font-family:"DM Mono",monospace;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;}
.cdn{font-size:10px;color:var(--muted);text-align:center;padding:3px 0;font-weight:600;}
.cday{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--muted);background:var(--surface2);cursor:pointer;min-width:0;gap:1px;}
.cday.ct{background:rgba(0,212,170,0.15);color:var(--accent);}
.cday.cr{background:rgba(255,77,109,0.15);color:var(--red);}
.cday.today{border:1.5px solid var(--accent);}
.cday.empty{background:none;cursor:default;}
.ablock{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin:0 14px 10px;}
.aname{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;}
.bias-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.bbtn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:600;}
.bb-bull{background:rgba(0,212,170,0.15);border-color:rgba(0,212,170,0.4);color:var(--green);}
.bb-bear{background:rgba(255,77,109,0.15);border-color:rgba(255,77,109,0.4);color:var(--red);}
.bb-neut{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.4);color:var(--yellow);}
.tfl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.fbtn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:600;}
.fbtn-on{background:rgba(0,212,170,0.12);border-color:var(--accent);color:var(--accent);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-inner{max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 14px max(80px,env(safe-area-inset-bottom));}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:18px;font-weight:700;}
.close-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;color:var(--muted2);font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.slabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:14px 0 8px;}
.g-green{color:var(--green);}
.g-red{color:var(--red);}
.g-yellow{color:var(--yellow);}
.mono{font-family:"DM Mono",monospace;}
</style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>
  <div id="content">
    <div id="v-home"></div>
    <div id="v-liste" style="display:none"></div>
    <div id="v-trading" style="display:none"></div>
    <div id="v-investments" style="display:none"></div>
    <div id="v-ausblick" style="display:none"></div>
    <div id="v-calendar" style="display:none"></div>
  </div>
  <nav>
    <button class="nb on" onclick="go('home')" id="n-home"><span class="ico">📊</span>Home</button>
    <button class="nb" onclick="go('liste')" id="n-liste"><span class="ico">📋</span>Liste</button>
    <button class="nb" onclick="go('trading')" id="n-trading"><span class="ico">⚡</span>Trades</button>
    <button class="nb" onclick="go('investments')" id="n-investments"><span class="ico">💼</span>Invest</button>
    <button class="nb" onclick="go('ausblick')" id="n-ausblick"><span class="ico">🔭</span>Ausblick</button>
  </nav>
</div>
<script>
// === CONSTANTS ===
var ASSETS = ['DXY','NQ1 Nasdaq','ES1 SP500','BTCUSD','GER40','HSI HangSeng','XAU/USD','EUR/USD'];
var BIAS_OPTS = ['Bullish','Bearish','Neutral','Bullish/Neutral','Bearish/Neutral'];
var currentView = 'home';
var currentDir = 'Long';
var listeFilter = {type:'all',status:'all',dir:'all',sort:'date-desc'};
var ausblickData = {};
var currentWeekKey = '';

// === STORAGE ===
function loadData(key) { try { var r=localStorage.getItem(key); return r?JSON.parse(r):null; } catch(e){return null;} }
function saveData(key,val) { try { localStorage.setItem(key,JSON.stringify(val)); } catch(e){} }
function loadTrades() { return loadData('tj_trades') || []; }
function loadInvs() { return loadData('tj_invs') || []; }
function loadAusblick() { return loadData('tj_ausblick') || {}; }
function saveTrades(d) { saveData('tj_trades',d); }
function saveInvs(d) { saveData('tj_invs',d); }
function saveAusblickAll(d) { saveData('tj_ausblick',d); }

function el(id) { return document.getElementById(id); }
function today() { return new Date().toISOString().split('T')[0]; }
function nowTime() { return new Date().toTimeString().slice(0,5); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmtD(s) { try{return new Date(s+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});}catch(e){return s||'';} }
function fmtFull() { return new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}); }

function toast(msg,ms) {
  if(!ms) ms=2500;
  var t=el('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},ms);
}

function getWeekKey() {
  var d=new Date();
  var y=d.getFullYear();
  var start=new Date(d.getFullYear(),0,1);
  var wk=Math.ceil((((d-start)/86400000)+start.getDay()+1)/7);
  return y+'-W'+(wk<10?'0'+wk:wk);
}

// === NAVIGATION ===
function go(v) {
  currentView=v;
  var views=['home','liste','trading','investments','ausblick','calendar'];
  for(var i=0;i<views.length;i++){
    var ve=el('v-'+views[i]);
    if(ve) ve.style.display=(views[i]===v)?'block':'none';
    var nb=el('n-'+views[i]);
    if(nb) nb.classList.toggle('on',views[i]===v);
  }
  el('content').scrollTop=0;
  if(v==='home') rHome();
  if(v==='liste') rListe();
  if(v==='trading') rTrading();
  if(v==='investments') rInvestments();
  if(v==='ausblick') rAusblick();
  if(v==='calendar') rCalendar();
}

// === POSITION CARD HTML ===
function posCardHTML(p, ptype) {
  var isL=p.direction==='Long';
  var isCl=!!p.exitDate;
  var rVal=parseFloat(p.rResult)||0;
  var pnlPct=parseFloat((p.pnlPct||'').replace('%',''))||0;
  var isPos=(p.rResult&&rVal>=0)||(p.pnlPct&&pnlPct>=0)||(p.pnlAmt&&p.pnlAmt.indexOf('+')===0);
  var pnlClass=isPos?'pnl-pos':'pnl-neg';
  var onclick=ptype==='trade'?'openTrade("'+p.id+'")':'openInv("'+p.id+'")';

  var html='<div class="pcard '+(isL?'pcard-l':'pcard-s')+'" onclick="'+onclick+'">';
  html+='<div class="ph">';
  html+='<div>';
  html+='<span class="pticker">'+p.ticker+'</span>';
  html+='<span class="pbadge '+(isL?'pb-l':'pb-s')+'">'+(isL?'LONG':'SHORT')+'</span>';
  html+='<span class="pbadge '+(ptype==='trade'?'pb-t':'pb-i')+'">'+(ptype==='trade'?'Trade':'Invest')+'</span>';
  html+='<span class="pbadge '+(isCl?'pb-c':'pb-o')+'">'+(isCl?'Closed':'Open')+'</span>';
  html+='</div>';
  if(isCl&&(p.rResult||p.pnlPct||p.pnlAmt)){
    html+='<div style="text-align:right">';
    if(p.rResult) html+='<div class="'+pnlClass+'">'+(rVal>=0?'+':'')+rVal.toFixed(2)+'R</div>';
    if(p.pnlPct) html+='<div class="'+pnlClass+'" style="font-size:11px">'+p.pnlPct+'</div>';
    if(p.pnlAmt) html+='<div class="'+pnlClass+'" style="font-size:11px">'+p.pnlAmt+'</div>';
    html+='</div>';
  }
  html+='</div>';
  html+='<div class="pmeta">';
  html+='<span class="pm">Entry <span class="pmv">'+(p.entryPrice||'-')+'</span></span>';
  if(p.exitPrice) html+='<span class="pm">Exit <span class="pmv">'+p.exitPrice+'</span></span>';
  if(p.stopLoss) html+='<span class="pm">SL <span class="pmv">'+p.stopLoss+'</span></span>';
  if(p.feeBuy||p.feeSell) html+='<span class="pm">Geb. <span class="pmv">'+[p.feeBuy,p.feeSell].filter(Boolean).join('/')+'</span></span>';
  html+='<span class="pm">'+fmtD(p.entryDate)+'</span>';
  html+='</div>';
  html+='</div>';
  return html;
}

// === HOME ===
function rHome() {
  var trades=loadTrades(), invs=loadInvs();
  var openT=trades.filter(function(t){return !t.exitDate;});
  var openI=invs.filter(function(i){return !i.exitDate;});
  var closedT=trades.filter(function(t){return t.exitDate;});
  var wins=closedT.filter(function(t){return parseFloat(t.rResult)>0;});
  var wr=closedT.length>0?Math.round(wins.length/closedT.length*100):0;
  var totalR=closedT.reduce(function(a,t){return a+(parseFloat(t.rResult)||0);},0);
  var wk=getWeekKey();
  var aus=loadAusblick()[wk];
  var ausFilled=0;
  if(aus){ASSETS.forEach(function(a){var k=a.replace(/[^a-z0-9]/gi,'_');if(aus[k]&&(aus[k].weekly||aus[k].szenario))ausFilled++;});}

  var html='<div class="hdr">';
  html+='<div class="hdr-title">Trading Journal</div>';
  html+='<div class="hdr-sub">'+fmtFull()+'</div>';
  html+='</div>';

  html+='<div class="srow">';
  html+='<div class="sbox"><div class="sval g-yellow">'+openT.length+'</div><div class="slbl">Trades offen</div></div>';
  html+='<div class="sbox"><div class="sval g-green">'+openI.length+'</div><div class="slbl">Invest offen</div></div>';
  html+='<div class="sbox"><div class="sval">'+wr+'%</div><div class="slbl">Win Rate</div></div>';
  html+='<div class="sbox"><div class="sval '+(totalR>=0?'g-green':'g-red')+'">'+(totalR>=0?'+':'')+totalR.toFixed(1)+'R</div><div class="slbl">Total R</div></div>';
  html+='</div>';

  html+='<div class="card">';
  html+='<div class="ct">Schnellzugriff</div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:8px">';
  html+='<button class="btn btn-p" style="flex:1" onclick="showAddTrade(null)">+ Trade</button>';
  html+='<button class="btn btn-g" style="flex:1" onclick="showAddInv(null)">+ Investment</button>';
  html+='</div>';
  html+='<div style="display:flex;gap:8px">';
  html+='<button class="btn btn-g" style="flex:1" onclick="go(\'liste\')">📋 Liste</button>';
  html+='<button class="btn btn-g" style="flex:1" onclick="go(\'ausblick\')">🔭 Ausblick</button>';
  html+='<button class="btn btn-g" style="flex:1" onclick="go(\'calendar\')">📅 Kalender</button>';
  html+='</div>';
  html+='</div>';

  html+='<div class="card" style="cursor:pointer;background:linear-gradient(135deg,rgba(0,212,170,0.06),rgba(59,130,246,0.04));border-color:rgba(0,212,170,0.2)" onclick="go(\'ausblick\')">';
  html+='<div class="ct">Wöchentlicher Ausblick '+wk+'</div>';
  html+='<div style="font-size:13px;color:var(--muted2)">'+ausFilled+'/'+ASSETS.length+' Assets analysiert → Ausblick öffnen</div>';
  html+='</div>';

  if(openT.length>0){
    html+='<div class="card"><div class="ct g-yellow">Offene Trades</div>';
    openT.slice(0,3).forEach(function(t){html+=posCardHTML(t,'trade');});
    if(openT.length>3) html+='<button class="btn btn-g btn-sm" style="width:100%;margin-top:6px" onclick="go(\'trading\')">Alle '+openT.length+' anzeigen</button>';
    html+='</div>';
  }
  if(openI.length>0){
    html+='<div class="card"><div class="ct">Offene Investments</div>';
    openI.slice(0,3).forEach(function(i){html+=posCardHTML(i,'investment');});
    if(openI.length>3) html+='<button class="btn btn-g btn-sm" style="width:100%;margin-top:6px" onclick="go(\'investments\')">Alle anzeigen</button>';
    html+='</div>';
  }
  html+='<div style="height:10px"></div>';
  el('v-home').innerHTML=html;
}

// === LISTE ===
function rListe() {
  var trades=loadTrades().map(function(t){t._pt='trade';return t;});
  var invs=loadInvs().map(function(i){i._pt='investment';return i;});
  var all=trades.concat(invs);

  if(listeFilter.type!=='all') all=all.filter(function(p){return p._pt===listeFilter.type;});
  if(listeFilter.status==='open') all=all.filter(function(p){return !p.exitDate;});
  if(listeFilter.status==='closed') all=all.filter(function(p){return !!p.exitDate;});
  if(listeFilter.dir!=='all') all=all.filter(function(p){return p.direction===listeFilter.dir;});

  all.sort(function(a,b){
    if(listeFilter.sort==='date-desc') return (b.entryDate||'').localeCompare(a.entryDate||'');
    if(listeFilter.sort==='date-asc') return (a.entryDate||'').localeCompare(b.entryDate||'');
    if(listeFilter.sort==='pnl') return (parseFloat(b.rResult)||0)-(parseFloat(a.rResult)||0);
    if(listeFilter.sort==='ticker') return (a.ticker||'').localeCompare(b.ticker||'');
    return 0;
  });

  var closed=all.filter(function(p){return p.exitDate;});
  var wins=closed.filter(function(p){return parseFloat(p.rResult)>0;});
  var wr=closed.length>0?Math.round(wins.length/closed.length*100):0;
  var totalR=closed.reduce(function(a,p){return a+(parseFloat(p.rResult)||0);},0);

  function fb(key,val,label) {
    var on=listeFilter[key]===val;
    return '<button class="fbtn '+(on?'fbtn-on':'')+'" onclick="listeFilter.'+key+'=\''+val+'\';rListe()">'+label+'</button>';
  }

  var html='<div class="hdr"><div class="hdr-title">📋 Positionen</div><div class="hdr-sub">'+all.length+' Einträge</div></div>';

  html+='<div class="srow">';
  html+='<div class="sbox"><div class="sval">'+all.length+'</div><div class="slbl">Gesamt</div></div>';
  html+='<div class="sbox"><div class="sval g-yellow">'+all.filter(function(p){return !p.exitDate;}).length+'</div><div class="slbl">Offen</div></div>';
  html+='<div class="sbox"><div class="sval">'+wr+'%</div><div class="slbl">Win Rate</div></div>';
  html+='<div class="sbox"><div class="sval '+(totalR>=0?'g-green':'g-red')+'">'+(totalR>=0?'+':'')+totalR.toFixed(1)+'R</div><div class="slbl">Total R</div></div>';
  html+='</div>';

  html+='<div class="card" style="padding:12px">';
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
  html+=fb('type','all','Alle')+fb('type','trade','Trades')+fb('type','investment','Invest');

// === TRADING ===
function rTrading() {
  var trades=loadTrades();
  var open=trades.filter(function(t){return !t.exitDate;});
  var closed=trades.filter(function(t){return t.exitDate;});
  var wins=closed.filter(function(t){return parseFloat(t.rResult)>0;});
  var wr=closed.length>0?Math.round(wins.length/closed.length*100):0;
  var totalR=closed.reduce(function(a,t){return a+(parseFloat(t.rResult)||0);},0);

  var html='<div class="hdr"><div class="hdr-title">⚡ Trading</div><div class="hdr-sub">Kurzfristige Trades</div></div>';
  html+='<div class="srow">';

  html+='<div class="sbox"><div class="sval">'+wr+'%</div><div class="slbl">Win Rate</div></div>';
  html+='<div class="sbox"><div class="sval '+(totalR>=0?'g-green':'g-red')+'">'+(totalR>=0?'+':'')+totalR.toFixed(2)+'R</div><div class="slbl">Total R</div></div>';
  html+='</div>';
  html+='<div style="margin:0 14px 12px"><button class="btn btn-p btn-w" onclick="showAddTrade(null)">+ Trade eintragen</button></div>';

  if(open.length>0){
    html+='<div class="card"><div class="ct g-yellow">Offene Trades ('+open.length+')</div>';
    open.forEach(function(t){html+=posCardHTML(t,'trade');});
    html+='</div>';
  }
  html+='<div class="card"><div class="ct">Geschlossene Trades ('+closed.length+')</div>';
  if(closed.length===0){
    html+='<div style="text-align:center;padding:20px;color:var(--muted)">Noch keine geschlossenen Trades</div>';
  } else {
    closed.slice().reverse().forEach(function(t){html+=posCardHTML(t,'trade');});

  html+='<div style="height:10px"></div>';
  el('v-trading').innerHTML=html;
}

function calcPnL() {
  var entry=parseFloat((el('i-ep-store')||{}).value||el('i-ep')?el('i-ep').value:'');
  var exit=parseFloat((el('i-xp')||{}).value||'');
  var shares=parseFloat((el('i-sh-store')||{}).value||el('i-sh')?el('i-sh').value:'');
  var fb=parseFloat((el('i-fb-store')||{}).value||'0')||0;
  var fx=parseFloat((el('i-fsx')||{}).value||'0')||0;
  if(!entry||!exit) return;
  var pct=((exit-entry)/entry*100);
  var amt=shares?((exit-entry)*shares-fb-fx):null;
  var paEl=el('i-pa'), ppEl=el('i-pp');
  if(ppEl) ppEl.value=pct.toFixed(2)+'%';
  if(paEl&&amt!==null) paEl.value=(amt>=0?'+':'')+amt.toFixed(2)+'€';
  var disp=el('i-pnl-display');
  if(disp){
    var c=pct>=0?'var(--green)':'var(--red)';
    disp.innerHTML='<div style="text-align:center;padding:10px;background:var(--surface2);border-radius:10px;margin-top:6px">'
      +'<div style="font-size:20px;font-weight:700;color:'+c+';font-family:DM Mono,monospace">'+(pct>=0?'+':'')+pct.toFixed(2)+'%</div>'
      +(amt!==null?'<div style="font-size:13px;color:'+c+';font-family:DM Mono,monospace">'+(amt>=0?'+':'')+amt.toFixed(2)+'€ (nach Geb.)</div>':'')
      +'</div>';
  }
}

// === CALENDAR ===
function rCalendar() {
  var trades=loadTrades(), invs=loadInvs();
  var now=new Date(), y=now.getFullYear(), mo=now.getMonth();
  var first=new Date(y,mo,1), last=new Date(y,mo+1,0);
  var startDow=(first.getDay()+6)%7, td=today();

  var dateMap={};
  trades.concat(invs).forEach(function(p){
    if(p.entryDate){if(!dateMap[p.entryDate])dateMap[p.entryDate]={e:[],x:[]};dateMap[p.entryDate].e.push(p);}
    if(p.exitDate){if(!dateMap[p.exitDate])dateMap[p.exitDate]={e:[],x:[]};dateMap[p.exitDate].x.push(p);}
  });

  var cal='<div class="cgrid">';
  var days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  for(var di=0;di<days.length;di++) cal+='<div class="cdn">'+days[di]+'</div>';
  for(var e=0;e<startDow;e++) cal+='<div class="cday empty"></div>';
  for(var d=1;d<=last.getDate();d++){
    var ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dm=dateMap[ds];
    var hasLoss=dm&&dm.x.some(function(p){return parseFloat(p.rResult)<0||parseFloat((p.pnlPct||'').replace('%',''))<0;});
    var hasTrade=!!dm;
    var ec=dm?dm.e.length:0, xc=dm?dm.x.length:0;
    cal+='<div class="cday '+(hasTrade?(hasLoss?'cr':'ct'):'')+' '+(ds===td?'today':'')+'" onclick="openCalDay(\''+ds+'\')">'+d;
    if(ec) cal+='<span style="font-size:8px;color:var(--accent)">▲'+ec+'</span>';
    if(xc) cal+='<span style="font-size:8px;color:'+(hasLoss?'var(--red)':'var(--green)')+'">✓'+xc+'</span>';
    cal+='</div>';
  }
  cal+='</div>';

  var monthT=trades.filter(function(t){return (t.entryDate||'').startsWith(y+'-'+String(mo+1).padStart(2,'0'));});
  var monthCl=monthT.filter(function(t){return t.exitDate;});
  var mR=monthCl.reduce(function(a,t){return a+(parseFloat(t.rResult)||0);},0);
  var mWr=monthCl.length?Math.round(monthCl.filter(function(t){return parseFloat(t.rResult)>0;}).length/monthCl.length*100):0;

  var html='<div class="hdr"><div class="hdr-title">📅 Kalender</div>';
  html+='<div class="hdr-sub">'+now.toLocaleDateString('de-DE',{month:'long',year:'numeric'})+'</div></div>';
  html+='<div style="margin:0 14px 6px;display:flex;gap:10px;font-size:11px;color:var(--muted);align-items:center">';
  html+='<span style="width:10px;height:10px;background:rgba(0,212,170,0.15);border-radius:2px;display:inline-block"></span>Trade/Invest ';
  html+='<span style="width:10px;height:10px;background:rgba(255,77,109,0.15);border-radius:2px;display:inline-block"></span>Verlust</div>';
  html+='<div class="card" style="padding:10px">'+cal+'</div>';
  html+='<div class="srow">';
  html+='<div class="sbox"><div class="sval">'+monthT.length+'</div><div class="slbl">Trades</div></div>';
  html+='<div class="sbox"><div class="sval">'+mWr+'%</div><div class="slbl">Win Rate</div></div>';
  html+='<div class="sbox"><div class="sval '+(mR>=0?'g-green':'g-red')+'">'+(mR>=0?'+':'')+mR.toFixed(1)+'R</div><div class="slbl">Monats-R</div></div>';
  html+='</div>';
  html+='<div style="margin:0 14px;display:flex;gap:8px">';
  html+='<button class="btn btn-g btn-sm" style="flex:1" onclick="go(\'investments\')">💼 Investments</button>';
  html+='<button class="btn btn-g btn-sm" style="flex:1" onclick="exportAllCSV()">📊 Export</button>';
  html+='</div>';
  html+='<div style="height:10px"></div>';
  el('v-calendar').innerHTML=html;
}

function openCalDay(ds) {
  var trades=loadTrades(), invs=loadInvs();
  var all=trades.concat(invs).filter(function(p){return p.entryDate===ds||p.exitDate===ds;});
  if(!all.length){toast('Kein Eintrag');return;}

  var exits=all.filter(function(p){return p.exitDate===ds&&p.rResult;});
  var totalR=exits.reduce(function(a,p){return a+(parseFloat(p.rResult)||0);},0);

  var modal=document.createElement('div');
  modal.className='modal'; modal.id='cal-modal';
  var h='<div class="modal-inner">';
  h+='<div class="modal-hdr"><div class="modal-title">'+fmtD(ds)+'</div>';
  h+='<button class="close-btn" onclick="el(\'cal-modal\').remove()">✕</button></div>';

  if(exits.length){
    h+='<div class="srow">';
    h+='<div class="sbox"><div class="sval '+(totalR>=0?'g-green':'g-red')+'">'+(totalR>=0?'+':'')+totalR.toFixed(2)+'R</div><div class="slbl">Tages-R</div></div>';
    h+='</div>';
  }

  all.forEach(function(p){
    var isEntry=p.entryDate===ds, isExit=p.exitDate===ds;
    h+='<div style="font-size:10px;color:var(--muted);margin-bottom:3px">';
    if(isEntry) h+='📥 ENTRY';
    if(isExit) h+=' 📤 EXIT';
    h+='</div>';
    h+=posCardHTML(p,p.type||'trade');
  });
  h+='<div style="height:20px"></div></div>';
  modal.innerHTML=h;
  document.body.appendChild(modal);
}

// === EXPORT ===
function buildCSV(all) {
  var rows=[['Typ','Ticker','Richtung','Status','Entry Datum','Entry Zeit','Entry Preis','Stop Loss','Take Profit','Risiko %','Risiko €','Gebühren Kauf','Gebühren Verkauf','Betrag','Shares','Strategie','Exit Datum','Exit Preis','R-Ergebnis','PnL %','PnL €','Exit Notizen']];
  all.forEach(function(p){
    rows.push([p.type||p._pt||'',p.ticker||'',p.direction||'',p.exitDate?'Closed':'Open',
      p.entryDate||'',p.entryTime||'',p.entryPrice||'',p.stopLoss||'',p.takeProfit||'',
      p.riskPct||'',p.riskAmt||'',p.feeBuy||'',p.feeSell||'',p.amount||'',p.shares||'',
      p.strategy||'',p.exitDate||'',p.exitPrice||'',p.rResult||'',p.pnlPct||'',p.pnlAmt||'',p.exitNotes||'']);
  });
  return rows.map(function(r){return r.map(function(c){return '"'+(c+'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
}

function downloadCSV(csv, name) {
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
}

function exportAllCSV() {
  var all=loadTrades().concat(loadInvs());
  downloadCSV(buildCSV(all),'trading-journal-'+today()+'.csv');
  toast('✓ CSV Export gestartet');
}

  var all=trades.concat(invs);
  if(listeFilter.type!=='all') all=all.filter(function(p){return p._pt===listeFilter.type;});
  if(listeFilter.status==='open') all=all.filter(function(p){return !p.exitDate;});
  if(listeFilter.status==='closed') all=all.filter(function(p){return !!p.exitDate;});
  if(listeFilter.dir!=='all') all=all.filter(function(p){return p.direction===listeFilter.dir;});
  downloadCSV(buildCSV(all),'positionen-'+today()+'.csv');
  toast('✓ Excel Export gestartet');
}

function exportListePDF() {
  var trades=loadTrades().map(function(t){t._pt='trade';return t;});
  var invs=loadInvs().map(function(i){i._pt='investment';return i;});
  var all=trades.concat(invs);
  if(listeFilter.type!=='all') all=all.filter(function(p){return p._pt===listeFilter.type;});
  if(listeFilter.status==='open') all=all.filter(function(p){return !p.exitDate;});
  if(listeFilter.status==='closed') all=all.filter(function(p){return !!p.exitDate;});

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Positionen</title>';
  html+='<style>body{font-family:Arial,sans-serif;padding:20px;}h1{border-bottom:2px solid #00d4aa;padding-bottom:8px;}';
  html+='table{width:100%;border-collapse:collapse;font-size:11px;}th{background:#003366;color:#fff;padding:5px 6px;text-align:left;}';
  html+='td{padding:5px 6px;border-bottom:1px solid #eee;}tr:nth-child(even){background:#f9f9f9;}';
  html+='.pos{color:#00a882;font-weight:700;}.neg{color:#ff4d6d;font-weight:700;}';
  html+='.long{color:#00a882;}.short{color:#ff4d6d;}@media print{body{padding:8px;}}</style>';
  html+='</head><body><h1>📋 Positionen · '+new Date().toLocaleDateString('de-DE')+'</h1>';
  html+='<p style="color:#666;font-size:11px">Gesamt: '+all.length+' · Offen: '+all.filter(function(p){return !p.exitDate;}).length+'</p>';
  html+='<table><tr><th>Typ</th><th>Ticker</th><th>Richtung</th><th>Status</th><th>Entry</th><th>Entry Preis</th><th>Exit Preis</th><th>R</th><th>PnL%</th><th>PnL€</th><th>Gebühren</th></tr>';
  all.forEach(function(p){
    var r=parseFloat(p.rResult)||0, pp=parseFloat((p.pnlPct||'').replace('%',''))||0;
    var isPos=r>0||pp>0||(p.pnlAmt&&p.pnlAmt.indexOf('+')===0);
    html+='<tr><td>'+p._pt+'</td><td><b>'+(p.ticker||'')+'</b></td>';
    html+='<td class="'+(p.direction==='Long'?'long':'short')+'">'+(p.direction||'')+'</td>';
    html+='<td>'+(p.exitDate?'Closed':'Open')+'</td>';
    html+='<td>'+(p.entryDate||'')+'</td>';
    html+='<td style="font-family:monospace">'+(p.entryPrice||'–')+'</td>';
    html+='<td style="font-family:monospace">'+(p.exitPrice||'–')+'</td>';
    html+='<td class="'+(isPos?'pos':'neg')+'">'+(p.rResult||'–')+'</td>';
    html+='<td class="'+(isPos?'pos':'neg')+'">'+(p.pnlPct||'–')+'</td>';
    html+='<td class="'+(isPos?'pos':'neg')+'">'+(p.pnlAmt||'–')+'</td>';
    html+='<td>'+([p.feeBuy,p.feeSell].filter(Boolean).join('/')||'–')+'</td></tr>';
  });
  html+='</table></body></html>';
  var win=window.open('','_blank');
  win.document.write(html); win.document.close(); win.print();
}
