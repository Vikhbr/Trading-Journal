<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trading Journal">
<title>Trading Journal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f; --surface:#0f1318; --surface2:#161c23; --surface3:#1d2530;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --accent:#00d4aa; --accent2:#00a882; --red:#ff4d6d; --green:#00d4aa;
  --yellow:#fbbf24; --blue:#3b82f6; --purple:#8b5cf6;
  --text:#f0f4f8; --muted:#5a6a7a; --muted2:#8a9ab0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;}
#app{height:100vh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;}
#content{flex:1;overflow-y:auto;padding:0 0 80px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{display:none;}

/* NAV */
nav{position:absolute;bottom:0;left:0;right:0;background:rgba(8,11,15,0.97);border-top:1px solid var(--border2);display:flex;padding:8px 0 max(12px,env(safe-area-inset-bottom));backdrop-filter:blur(20px);z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;transition:color 0.2s;padding:4px 0;}
.nb .ico{font-size:22px;line-height:1;}
.nb.on{color:var(--accent);}

/* HEADER */
.hdr{padding:max(44px,env(safe-area-inset-top)) 16px 16px;background:radial-gradient(ellipse at 50% -20%,rgba(0,212,170,0.08) 0%,transparent 70%);}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr-title{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.02em;}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.hdr-badge{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--accent);font-weight:600;}

/* CARDS */
.card{margin:0 14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;}
.card-accent{border-color:rgba(0,212,170,0.2);}
.card-red{border-color:rgba(255,77,109,0.2);}
.ct{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:12px;}
.ct-red{color:var(--red);}
.ct-yellow{color:var(--yellow);}
.ct-blue{color:var(--blue);}

/* FORMS */
.fl{font-size:12px;color:var(--muted2);margin-bottom:5px;display:block;font-weight:500;}
.fg{margin-bottom:12px;}
textarea,input[type=text],input[type=date],input[type=time],input[type=number],select{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;
  resize:none;line-height:1.5;outline:none;transition:border-color 0.2s;-webkit-appearance:none;
}
textarea:focus,input:focus,select:focus{border-color:rgba(0,212,170,0.4);}
select option{background:var(--surface2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* BUTTONS */
.btn{padding:12px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.05em;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#080b0f;}
.btn-danger{background:rgba(255,77,109,0.15);border:1px solid rgba(255,77,109,0.3);color:var(--red);}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--muted2);}
.btn-full{width:100%;}
.btn-sm{padding:7px 12px;font-size:11px;}

/* DIRECTION TOGGLE */
.dir-toggle{display:flex;gap:8px;margin-bottom:12px;}
.dir-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;text-align:center;}
.dir-btn.long{background:rgba(0,212,170,0.12);border-color:rgba(0,212,170,0.4);color:var(--green);}
.dir-btn.short{background:rgba(255,77,109,0.12);border-color:rgba(255,77,109,0.4);color:var(--red);}
.dir-btn.inactive{opacity:0.4;}

/* POSITION CARDS */
.pos-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.pos-card:hover{border-color:var(--border2);}
.pos-card.open-long{border-left:3px solid var(--green);}
.pos-card.open-short{border-left:3px solid var(--red);}
.pos-card.closed-profit{border-left:3px solid var(--green);opacity:0.8;}
.pos-card.closed-loss{border-left:3px solid var(--red);opacity:0.8;}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.pos-ticker{font-size:16px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}
.pos-badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;}
.badge-long{background:rgba(0,212,170,0.15);color:var(--green);}
.badge-short{background:rgba(255,77,109,0.15);color:var(--red);}
.badge-open{background:rgba(59,130,246,0.15);color:var(--blue);}
.badge-closed{background:rgba(90,106,122,0.15);color:var(--muted2);}
.pos-meta{display:flex;gap:12px;flex-wrap:wrap;}
.pos-meta-item{font-size:11px;color:var(--muted);}
.pos-meta-val{color:var(--muted2);font-weight:500;font-family:'DM Mono',monospace;}
.pos-pnl{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;}
.pnl-pos{color:var(--green);}
.pnl-neg{color:var(--red);}

/* STATS ROW */
.stats-row{display:flex;gap:8px;margin:0 14px 10px;}
.stat-mini{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-mini-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}
.stat-mini-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}

/* CALENDAR */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px;}
.cdn{font-size:10px;color:var(--muted);text-align:center;padding:3px 0;font-weight:600;}
.cday{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--muted);background:var(--surface2);cursor:pointer;min-width:0;overflow:hidden;gap:1px;}
.cday.has-trade{background:rgba(0,212,170,0.15);color:var(--accent);}
.cday.has-loss{background:rgba(255,77,109,0.15);color:var(--red);}
.cday.today{border:1.5px solid var(--accent);}
.cday.empty{background:none;cursor:default;}
.cdot{width:3px;height:3px;border-radius:50%;background:var(--accent);}

/* AUSBLICK */
.asset-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.asset-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.bias-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.bias-btn{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all 0.15s;}
.bias-btn.bull{background:rgba(0,212,170,0.15);border-color:rgba(0,212,170,0.4);color:var(--green);}
.bias-btn.bear{background:rgba(255,77,109,0.15);border-color:rgba(255,77,109,0.4);color:var(--red);}
.bias-btn.neut{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.4);color:var(--yellow);}
.tf-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.tf-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;}
.screenshot-zone{border:1px dashed var(--border2);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:border-color 0.15s;position:relative;}
.screenshot-zone:hover{border-color:var(--accent);}
.screenshot-zone img{max-width:100%;border-radius:8px;margin-top:6px;}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-inner{max-width:560px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 14px max(80px,env(safe-area-inset-bottom));}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;color:var(--text);}
.close-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;color:var(--muted2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}

.gap{height:10px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.mono{font-family:'DM Mono',monospace;}
.text-green{color:var(--green);}
.text-red{color:var(--red);}
.text-yellow{color:var(--yellow);}
.section-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 8px;}
</style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>
  <div id="content">
    <div id="v-dashboard"></div>
    <div id="v-investments" style="display:none"></div>
    <div id="v-trading" style="display:none"></div>
    <div id="v-ausblick" style="display:none"></div>
    <div id="v-calendar" style="display:none"></div>
  </div>
  <nav>
    <button class="nb on" onclick="go('dashboard')" id="n-dashboard"><span class="ico">📊</span>Dashboard</button>
    <button class="nb" onclick="go('investments')" id="n-investments"><span class="ico">💼</span>Invest</button>
    <button class="nb" onclick="go('trading')" id="n-trading"><span class="ico">⚡</span>Trading</button>
    <button class="nb" onclick="go('ausblick')" id="n-ausblick"><span class="ico">🔭</span>Ausblick</button>
    <button class="nb" onclick="go('calendar')" id="n-calendar"><span class="ico">📅</span>Kalender</button>
  </nav>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const ASSETS = ['DXY','NQ1! Nasdaq','ES1! S&P500','BTCUSD','GER40','HSI HangSeng','XAU/USD','EUR/USD'];
const BIAS_OPTIONS = ['Bullish','Bearish','Neutral','Bullish/Neutral','Bearish/Neutral'];

function load(key) { try { const r=localStorage.getItem(key); return r?JSON.parse(r):null; } catch(e){return null;} }
function save(key,val) { try { localStorage.setItem(key,JSON.stringify(val)); } catch(e){} }
function loadInvestments() { return load('tj_investments') || []; }
function loadTrades() { return load('tj_trades') || []; }
function loadAusblick() { return load('tj_ausblick') || {}; }
function saveInvestments(d) { save('tj_investments',d); }
function saveTrades(d) { save('tj_trades',d); }
function saveAusblick(d) { save('tj_ausblick',d); }

const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().split('T')[0];
const nowTime = () => new Date().toTimeString().slice(0,5);
const fmtDE = s => { try{return new Date(s+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});}catch(e){return s;} };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function toast(msg,ms=2500){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}

// ── NAVIGATION ────────────────────────────────────────────────
let currentView = 'dashboard';
function go(v) {
  currentView = v;
  ['dashboard','investments','trading','ausblick','calendar'].forEach(x=>{
    $('v-'+x).style.display = x===v?'block':'none';
    $('n-'+x).classList.toggle('on',x===v);
  });
  $('content').scrollTop=0;
  if(v==='dashboard') rDashboard();
  if(v==='investments') rInvestments();
  if(v==='trading') rTrading();
  if(v==='ausblick') rAusblick();
  if(v==='calendar') rCalendar();
}

// ── DASHBOARD ─────────────────────────────────────────────────
function currentWeekAusblick() {
  const allData = loadAusblick();
  const wk = getWeekKey();
  const d = allData[wk];
  if(!d) return 'Noch kein Ausblick diese Woche';
  const filled = ASSETS.filter(a => {
    const k = a.replace(/[^a-z0-9]/gi,'_');
    return d[k]?.szenario || d[k]?.weekly;
  }).length;
  return `${wk} · ${filled}/${ASSETS.length} Assets analysiert`;
}

function rDashboard() {
  const inv = loadInvestments();
  const trades = loadTrades();
  const openInv = inv.filter(i=>!i.exitDate).length;
  const openTrades = trades.filter(t=>!t.exitDate).length;
  const closedTrades = trades.filter(t=>t.exitDate);
  const winTrades = closedTrades.filter(t=>parseFloat(t.rResult)>0);
  const winRate = closedTrades.length>0?Math.round(winTrades.length/closedTrades.length*100):0;
  const totalR = closedTrades.reduce((a,t)=>a+(parseFloat(t.rResult)||0),0).toFixed(2);

  $('v-dashboard').innerHTML=`
    <div class="hdr">
      <div class="hdr-top">
        <div>
          <div class="hdr-title">Trading Journal</div>
          <div class="hdr-sub">${new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <div class="hdr-badge">LIVE</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-mini"><div class="stat-mini-val text-green">${openInv}</div><div class="stat-mini-lbl">Invest offen</div></div>
      <div class="stat-mini"><div class="stat-mini-val text-yellow">${openTrades}</div><div class="stat-mini-lbl">Trades offen</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${winRate}%</div><div class="stat-mini-lbl">Win Rate</div></div>
      <div class="stat-mini"><div class="stat-mini-val ${parseFloat(totalR)>=0?'text-green':'text-red'}">${parseFloat(totalR)>=0?'+':''}${totalR}R</div><div class="stat-mini-lbl">Gesamt R</div></div>
    </div>
    <div class="card">
      <div class="ct">Schnellzugriff</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn btn-primary" style="flex:1" onclick="showAddTrade()">⚡ Trade</button>
        <button class="btn btn-ghost" style="flex:1" onclick="showAddInvestment()">💼 Investment</button>
        <button class="btn btn-ghost" style="flex:1" onclick="go('ausblick')">🔭 Ausblick</button>
      </div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,rgba(0,212,170,0.06),rgba(59,130,246,0.04));border-color:rgba(0,212,170,0.2);cursor:pointer" onclick="go('ausblick')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="ct" style="margin-bottom:4px">🔭 Wöchentlicher Ausblick</div>
          <div style="font-size:13px;color:var(--muted2)">${currentWeekAusblick()}</div>
        </div>
        <div style="font-size:22px">→</div>
      </div>
    </div>
    ${openTrades>0?`<div class="card"><div class="ct ct-yellow">Offene Trades (${openTrades})</div>
      ${trades.filter(t=>!t.exitDate).slice(0,3).map(t=>posCard(t,'trade')).join('')}
      ${openTrades>3?`<div style="text-align:center;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="go('trading')">Alle ${openTrades} anzeigen →</button></div>`:''}
    </div>`:''}
    ${openInv>0?`<div class="card"><div class="ct">Offene Investments (${openInv})</div>
      ${inv.filter(i=>!i.exitDate).slice(0,3).map(i=>posCard(i,'investment')).join('')}
      ${openInv>3?`<div style="text-align:center;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="go('investments')">Alle anzeigen →</button></div>`:''}
    </div>`:''}
    ${closedTrades.length>0?`<div class="card"><div class="ct">Letzte geschlossene Trades</div>
      ${closedTrades.slice(-3).reverse().map(t=>posCard(t,'trade')).join('')}
    </div>`:''}
    <div class="gap"></div>
  `;
}

function posCard(p, type) {
  const isLong = p.direction==='Long';
  const isClosed = !!p.exitDate;
  const rVal = parseFloat(p.rResult);
  const hasR = !isNaN(rVal) && isClosed;
  return `<div class="pos-card ${isClosed?(rVal>=0?'closed-profit':'closed-loss'):(isLong?'open-long':'open-short')}" onclick="${type==='trade'?`openTrade('${p.id}')`:`openInvestment('${p.id}')`}">
    <div class="pos-header">
      <div>
        <span class="pos-ticker">${p.ticker}</span>
        <span class="pos-badge ${isLong?'badge-long':'badge-short'}" style="margin-left:8px">${p.direction}</span>
        <span class="pos-badge ${isClosed?'badge-closed':'badge-open'}" style="margin-left:4px">${isClosed?'Closed':'Open'}</span>
      </div>
      ${hasR?`<div class="pos-pnl ${rVal>=0?'pnl-pos':'pnl-neg'}">${rVal>=0?'+':''}${rVal.toFixed(2)}R</div>`:''}
    </div>
    <div class="pos-meta">
      <div class="pos-meta-item">Entry <span class="pos-meta-val">${p.entryPrice}</span></div>
      ${p.exitPrice?`<div class="pos-meta-item">Exit <span class="pos-meta-val">${p.exitPrice}</span></div>`:''}
      <div class="pos-meta-item">SL <span class="pos-meta-val">${p.stopLoss||'–'}</span></div>
      <div class="pos-meta-item">${fmtDE(p.entryDate)}</div>
    </div>
  </div>`;
}

// ── INVESTMENTS ───────────────────────────────────────────────
function rInvestments() {
  const inv = loadInvestments();
  const open = inv.filter(i=>!i.exitDate);
  const closed = inv.filter(i=>i.exitDate);

  $('v-investments').innerHTML=`
    <div class="hdr">
      <div class="hdr-title">💼 Investments</div>
      <div class="hdr-sub">Langfristige Positionen</div>
    </div>
    <div style="margin:0 14px 12px">
      <button class="btn btn-primary btn-full" onclick="showAddInvestment()">+ Investment hinzufügen</button>
    </div>
    ${open.length?`<div class="card card-accent"><div class="ct">Offen (${open.length})</div>
      ${open.map(i=>posCard(i,'investment')).join('')}
    </div>`:'<div class="card"><div style="text-align:center;color:var(--muted);padding:20px">Keine offenen Investments</div></div>'}
    ${closed.length?`<div class="card"><div class="ct">Geschlossen (${closed.length})</div>
      ${closed.slice().reverse().map(i=>posCard(i,'investment')).join('')}
    </div>`:''}
    <div class="gap"></div>
  `;
}

// ── TRADING ───────────────────────────────────────────────────
function rTrading() {
  const trades = loadTrades();
  const open = trades.filter(t=>!t.exitDate);
  const closed = trades.filter(t=>t.exitDate);
  const wins = closed.filter(t=>parseFloat(t.rResult)>0).length;
  const totalR = closed.reduce((a,t)=>a+(parseFloat(t.rResult)||0),0);

  $('v-trading').innerHTML=`
    <div class="hdr">
      <div class="hdr-title">⚡ Trading</div>
      <div class="hdr-sub">Kurzfristige Trades</div>
    </div>
    <div class="stats-row" style="margin-top:0">
      <div class="stat-mini"><div class="stat-mini-val text-yellow">${open.length}</div><div class="stat-mini-lbl">Offen</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${closed.length>0?Math.round(wins/closed.length*100):0}%</div><div class="stat-mini-lbl">Win Rate</div></div>
      <div class="stat-mini"><div class="stat-mini-val ${totalR>=0?'text-green':'text-red'}">${totalR>=0?'+':''}${totalR.toFixed(2)}R</div><div class="stat-mini-lbl">Total R</div></div>
    </div>
    <div style="margin:0 14px 12px">
      <button class="btn btn-primary btn-full" onclick="showAddTrade()">+ Trade eintragen</button>
    </div>
    ${open.length?`<div class="card card-accent"><div class="ct ct-yellow">Offene Trades (${open.length})</div>
      ${open.map(t=>posCard(t,'trade')).join('')}
    </div>`:''}
    ${closed.length?`<div class="card"><div class="ct">Geschlossene Trades (${closed.length})</div>
      ${closed.slice().reverse().map(t=>posCard(t,'trade')).join('')}

function setDir(d) {
  currentDir=d;

  if(ds){ds.className='dir-btn '+(d==='Short'?'short':'inactive');}
}

function saveTrade(existingId) {
  const ticker = $('t-ticker')?.value?.trim();
  if(!ticker){toast('Ticker fehlt');return;}
  const entryPrice = $('t-eprice')?.value?.trim();
  if(!entryPrice){toast('Entry Preis fehlt');return;}

  const trades = loadTrades();
  const trade = {
    id: existingId || uid(),
    type: 'trade',
    direction: currentDir,
    ticker: ticker.toUpperCase(),
    entryDate: $('t-edate')?.value||today(),
    entryTime: $('t-etime')?.value||'',
    entryPrice, stopLoss: $('t-sl')?.value||'',
    takeProfit: $('t-tp')?.value||'',
    riskPct: $('t-riskpct')?.value||'',
    riskAmt: $('t-riskamt')?.value||'',
    feeBuy: $('t-feebuy')?.value||'',
    feeSell: $('t-feesell')?.value||'',
    strategy: $('t-strategy')?.value||'',
    chartLink: $('t-link')?.value||'',
    notes: $('t-notes')?.value||'',
    exitDate: $('t-xdate')?.value||'',
    exitTime: $('t-xtime')?.value||'',
    exitPrice: $('t-xprice')?.value||'',
    rResult: $('t-rresult')?.value||'',
    pnlPct: $('t-pnlpct')?.value||'',
    exitChartLink: $('t-xlink')?.value||'',
    exitNotes: $('t-xnotes')?.value||'',
    savedAt: new Date().toISOString()
  };

  if(existingId) {
    const idx=trades.findIndex(t=>t.id===existingId);
    if(idx>=0) trades[idx]=trade; else trades.push(trade);
  } else trades.push(trade);

  saveTrades(trades);
  const modal=$('trade-modal');if(modal)modal.remove();
  toast('✓ Trade gespeichert');
  if(currentView==='trading')rTrading();
  else if(currentView==='dashboard')rDashboard();
}

function closeTradeModal(id) {
  const trades=loadTrades();
  const t=trades.find(x=>x.id===id);
  if(!t)return;
  t.exitDate=$('t-xdate')?.value||today();
  t.exitTime=$('t-xtime')?.value||'';
  t.exitPrice=$('t-xprice')?.value||'';
  t.rResult=$('t-rresult')?.value||'';
  t.pnlPct=$('t-pnlpct')?.value||'';
  t.exitChartLink=$('t-xlink')?.value||'';
  t.exitNotes=$('t-xnotes')?.value||'';
  saveTrades(trades);
  const modal=$('trade-modal');if(modal)modal.remove();
  toast('✓ Trade geschlossen');
  if(currentView==='trading')rTrading();else rDashboard();
}

function deleteTrade(id) {
  if(!confirm('Trade wirklich löschen?'))return;
  const trades=loadTrades().filter(t=>t.id!==id);
  saveTrades(trades);
  const modal=$('trade-modal');if(modal)modal.remove();
  toast('Trade gelöscht');
  if(currentView==='trading')rTrading();else rDashboard();
}

function openTrade(id) {
  const t=loadTrades().find(x=>x.id===id);
  if(t)showAddTrade(t);
}

function calcInvPnL() {
  const entry = parseFloat($('i-eprice')?.value);
  const exit = parseFloat($('i-xprice')?.value);
  const shares = parseFloat($('i-shares')?.value);
  const feeBuy = parseFloat($('i-feebuy')?.value) || 0;
  const feeSell = parseFloat($('i-feesell-exit')?.value) || 0;
  if(!entry || !exit) return;
  const pnlPct = ((exit - entry) / entry * 100);
  const pnlAmt = shares ? ((exit - entry) * shares - feeBuy - feeSell) : null;
  const pnlEl = $('i-pnl');
  const pnlAmtEl = $('i-pnlamt');
  if(pnlEl) pnlEl.value = pnlPct.toFixed(2) + '%';
  if(pnlAmtEl && pnlAmt !== null) pnlAmtEl.value = (pnlAmt >= 0 ? '+' : '') + pnlAmt.toFixed(2) + '€';
  const display = $('inv-pnl-display');
  if(display) {
    const color = pnlPct >= 0 ? 'var(--green)' : 'var(--red)';
    display.innerHTML = `<div style="text-align:center;padding:10px;background:var(--surface2);border-radius:10px">
      <div style="font-size:20px;font-weight:700;color:${color};font-family:'DM Mono',monospace">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</div>
      ${pnlAmt!==null?`<div style="font-size:13px;color:${color};font-family:'DM Mono',monospace">${pnlAmt>=0?'+':''}${pnlAmt.toFixed(2)}€ (nach Gebühren)</div>`:''}
    </div>`;
  }
}

// ── AUSBLICK ──────────────────────────────────────────────────
let ausblickData = {};
let currentWeekKey = '';

function getWeekKey(d) {
  const date = d || new Date();
  const year = date.getFullYear();
  const start = new Date(date);
  start.setDate(date.getDate() - date.getDay() + 1);
  const month = String(start.getMonth()+1).padStart(2,'0');
  const day = String(start.getDate()).padStart(2,'0');
  return `${year}-W${String(Math.ceil((((date - new Date(date.getFullYear(),0,1))/86400000)+1)/7)).padStart(2,'0')}`;
}

function rAusblick() {
  const allData = loadAusblick();

  ausblickData = allData[currentWeekKey] || {};

  $('v-ausblick').innerHTML=`

        <button class="btn btn-ghost btn-sm" onclick="changeWeek('${getWeekKey()}')">Heute</button>
      </div>
    </div>

      <div class="ct">📋 Persönliches Recap Vorwoche</div>

      <div class="fg"><label class="fl">📚 Learning</label><textarea id="recap-learn" rows="2" placeholder="Wichtigstes Learning...">${ausblickData.recapLearn||''}</textarea></div>
      <div class="fg"><label class="fl">🎯 Fokus diese Woche</label><textarea id="recap-focus" rows="2" placeholder="Fokus für die Folgewoche...">${ausblickData.recapFocus||''}</textarea></div>

        <div>
          <div class="tf-label">📸 Daily Link</div>
          <input type="text" id="${key}-link-daily" placeholder="TradingView Link..." value="${d.linkDaily||''}" style="font-size:11px;padding:6px 8px">
        </div>
        <div>
          <div class="tf-label">📸 H4/H1 Link</div>
          <input type="text" id="${key}-link-h4" placeholder="TradingView Link..." value="${d.linkH4||''}" style="font-size:11px;padding:6px 8px">
        </div>
      </div>
    </div>
    <div class="fg"><label class="fl">📋 Szenario</label><textarea id="${key}-szenario" rows="3" placeholder="Beschreibe das geplante Szenario...">${d.szenario||''}</textarea></div>
    <div class="fg"><label class="fl">🔗 Chart Link</label><input type="text" id="${key}-link" placeholder="https://www.tradingview.com/x/..." value="${d.link||''}"></div>
    <div class="fg"><label class="fl">🔄 Rückblick Vorwoche</label><textarea id="${key}-rueck" rows="2" placeholder="War der Read korrekt? Was ist passiert?">${d.rueckblick||''}</textarea></div>
  </div>`;
}

function setBias(key, bias) {
  if(!ausblickData[key]) ausblickData[key]={};
  ausblickData[key].bias = bias;
  const container = $('bias-'+key);
  if(container) container.innerHTML = BIAS_OPTIONS.map(b=>`<div class="bias-btn ${bias===b?(b.includes('Bull')?'bull':b.includes('Bear')?'bear':'neut'):''}"
    onclick="setBias('${key}','${b}')">${b}</div>`).join('');
}

function changeWeek(w) {
  saveAusblickData(false);
  currentWeekKey = w;
  const allData = loadAusblick();
  ausblickData = allData[w] || {};
  rAusblick();
}

function saveAusblickData(showToast=true) {
  // Collect all asset data
  ASSETS.forEach(asset=>{
    const key=asset.replace(/[^a-z0-9]/gi,'_');
    if(!ausblickData[key])ausblickData[key]={};
    const d=ausblickData[key];
    if($(`${key}-weekly`))d.weekly=$(`${key}-weekly`).value;
    if($(`${key}-daily`))d.daily=$(`${key}-daily`).value;
    if($(`${key}-h4`))d.h4=$(`${key}-h4`).value;
    if($(`${key}-link-weekly`))d.linkWeekly=$(`${key}-link-weekly`).value;
    if($(`${key}-link-daily`))d.linkDaily=$(`${key}-link-daily`).value;
    if($(`${key}-link-h4`))d.linkH4=$(`${key}-link-h4`).value;
    if($(`${key}-szenario`))d.szenario=$(`${key}-szenario`).value;
    if($(`${key}-link`))d.link=$(`${key}-link`).value;
    if($(`${key}-rueck`))d.rueckblick=$(`${key}-rueck`).value;
  });
  ausblickData.recapPro=$('recap-pro')?.value||'';
  ausblickData.recapCon=$('recap-con')?.value||'';
  ausblickData.recapLearn=$('recap-learn')?.value||'';
  ausblickData.recapFocus=$('recap-focus')?.value||'';
  ausblickData.savedAt=new Date().toISOString();

  const allData=loadAusblick();
  allData[currentWeekKey]=ausblickData;
  saveAusblick(allData);
  if(showToast)toast('✓ Ausblick gespeichert');
}

function exportAusblickPDF() {
  saveAusblickData(false);
  // Build printable HTML
  const html = buildAusblickHTML();
  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.print();
}

function buildAusblickHTML() {
  const biasColor = b => b&&b.includes('Bull')?'#00d4aa':b&&b.includes('Bear')?'#ff4d6d':'#fbbf24';
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Marktausblick ${currentWeekKey}</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:20px;color:#1a1a2e;}
    h1{color:#0a0a1e;border-bottom:3px solid #00d4aa;padding-bottom:12px;margin-bottom:24px;}
    h2{color:#0a0a1e;margin:0 0 12px;font-size:16px;}
    h3{color:#555;font-size:13px;margin:8px 0 4px;}
    .week{color:#666;font-size:14px;margin-bottom:8px;}
    .recap{background:#f8f9fa;border-left:4px solid #00d4aa;padding:14px;border-radius:4px;margin-bottom:24px;}
    .asset{border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px;page-break-inside:avoid;}
    .asset-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .bias{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
    .tf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
    .tf-box{background:#f8f9fa;padding:10px;border-radius:6px;}
    .tf-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:4px;}
    .tf-val{font-size:13px;}
    .szenario{background:#fff8e1;border:1px solid #ffd54f;padding:10px;border-radius:6px;margin-top:8px;}
    .rueck{background:#e8f5e9;border:1px solid #81c784;padding:10px;border-radius:6px;margin-top:8px;}
    a{color:#00a882;}
    @media print{body{padding:10px;}.asset{page-break-inside:avoid;}}
  </style></head><body>
  <h1>📈 Marktausblick ${currentWeekKey}</h1>
  ${ausblickData.recapPro||ausblickData.recapCon?`<div class="recap">
    <h2>📋 Persönliches Recap Vorwoche</h2>
    ${ausblickData.recapPro?`<p><strong>✅ Pro:</strong> ${ausblickData.recapPro}</p>`:''}
    ${ausblickData.recapCon?`<p><strong>❌ Contra:</strong> ${ausblickData.recapCon}</p>`:''}
    ${ausblickData.recapLearn?`<p><strong>📚 Learning:</strong> ${ausblickData.recapLearn}</p>`:''}
    ${ausblickData.recapFocus?`<p><strong>🎯 Fokus:</strong> ${ausblickData.recapFocus}</p>`:''}
  </div>`:''}
  ${ASSETS.map(asset=>{
    const key=asset.replace(/[^a-z0-9]/gi,'_');
    const d=ausblickData[key]||{};
    if(!d.weekly&&!d.daily&&!d.szenario)return '';
    const bc=biasColor(d.bias);
    return `<div class="asset">
      <div class="asset-header">
        <h2>${asset}</h2>
        ${d.bias?`<span class="bias" style="background:${bc}20;color:${bc};border:1px solid ${bc}40">${d.bias}</span>`:''}
      </div>
      <div class="tf-grid">
        <div class="tf-box">
          <div class="tf-label">Weekly</div>
          <div class="tf-val">${d.weekly||'–'}</div>
          ${d.linkWeekly?`<a href="${d.linkWeekly}" target="_blank" style="font-size:10px">📸 Chart →</a>`:''}
        </div>
        <div class="tf-box">
          <div class="tf-label">Daily</div>
          <div class="tf-val">${d.daily||'–'}</div>
          ${d.linkDaily?`<a href="${d.linkDaily}" target="_blank" style="font-size:10px">📸 Chart →</a>`:''}
        </div>
        <div class="tf-box">
          <div class="tf-label">H4/H1</div>
          <div class="tf-val">${d.h4||'–'}</div>
          ${d.linkH4?`<a href="${d.linkH4}" target="_blank" style="font-size:10px">📸 Chart →</a>`:''}
        </div>
      </div>
      ${d.szenario?`<div class="szenario"><strong>📋 Szenario:</strong><br>${d.szenario}</div>`:''}
      ${d.link?`<p style="margin-top:8px;font-size:12px">🔗 Haupt-Chart: <a href="${d.link}" target="_blank">${d.link}</a></p>`:''}

// ── CALENDAR ──────────────────────────────────────────────────
function rCalendar() {
  const trades=loadTrades(), invs=loadInvestments();
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const first=new Date(y,mo,1),last=new Date(y,mo+1,0);
  const startDow=(first.getDay()+6)%7, td=today();

  // Map dates to trade results
  const dateMap={};
  [...trades,...invs].forEach(p=>{
    if(p.entryDate){
      if(!dateMap[p.entryDate])dateMap[p.entryDate]={entries:[],exits:[]};
      dateMap[p.entryDate].entries.push(p);
    }
    if(p.exitDate){
      if(!dateMap[p.exitDate])dateMap[p.exitDate]={entries:[],exits:[]};
      dateMap[p.exitDate].exits.push(p);
    }
  });

  let cal='<div class="cgrid">';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>cal+=`<div class="cdn">${d}</div>`);
  for(let i=0;i<startDow;i++) cal+='<div class="cday empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dm=dateMap[ds];
    const hasLoss=dm?.exits?.some(p=>parseFloat(p.rResult)<0);
    const hasTrade=!!dm;
    cal+=`<div class="cday ${hasTrade?(hasLoss?'has-loss':'has-trade'):''} ${ds===td?'today':''}" onclick="openCalDay('${ds}')">
      ${d}${hasTrade?'<div class="cdot"></div>':''}
    </div>`;
  }
  cal+='</div>';

  // Monthly stats
  const monthTrades=trades.filter(t=>t.entryDate?.startsWith(`${y}-${String(mo+1).padStart(2,'0')}`));
  const monthClosed=monthTrades.filter(t=>t.exitDate);
  const monthR=monthClosed.reduce((a,t)=>a+(parseFloat(t.rResult)||0),0);

  $('v-calendar').innerHTML=`
    <div class="hdr">
      <div class="hdr-title">📅 Kalender</div>
      <div class="hdr-sub">${now.toLocaleDateString('de-DE',{month:'long',year:'numeric'})}</div>
    </div>
    <div style="margin:0 14px 6px;display:flex;gap:10px;font-size:11px;color:var(--muted);align-items:center">
      <span style="width:10px;height:10px;border-radius:2px;background:rgba(0,212,170,0.15);display:inline-block"></span>Trade/Invest
      <span style="width:10px;height:10px;border-radius:2px;background:rgba(255,77,109,0.15);display:inline-block"></span>Verlust
    </div>
    <div class="card" style="padding:10px">${cal}</div>
    <div class="stats-row">
      <div class="stat-mini"><div class="stat-mini-val">${monthTrades.length}</div><div class="stat-mini-lbl">Trades</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${monthClosed.length>0?Math.round(monthClosed.filter(t=>parseFloat(t.rResult)>0).length/monthClosed.length*100):0}%</div><div class="stat-mini-lbl">Win Rate</div></div>
      <div class="stat-mini"><div class="stat-mini-val ${monthR>=0?'text-green':'text-red'}">${monthR>=0?'+':''}${monthR.toFixed(1)}R</div><div class="stat-mini-lbl">Monats-R</div></div>
    </div>
    <div class="gap"></div>
  `;
}

function openCalDay(dateStr) {
  const trades=loadTrades(), invs=loadInvestments();
  const dayTrades=[...trades,...invs].filter(p=>p.entryDate===dateStr||p.exitDate===dateStr);
  if(!dayTrades.length){toast('Kein Eintrag für diesen Tag');return;}

  const modal=document.createElement('div');
  modal.className='modal';modal.id='cal-modal';
  modal.innerHTML=`<div class="modal-inner">
    <div class="modal-hdr">
      <div class="modal-title">${fmtDE(dateStr)}</div>
      <button class="close-btn" onclick="document.getElementById('cal-modal').remove()">✕</button>
    </div>
    ${dayTrades.map(p=>`<div style="margin-bottom:10px">${posCard(p,p.type)}</div>`).join('')}
    <div class="gap"></div>
  </div>`;
  document.body.appendChild(modal);
}

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  const trades=loadTrades(), invs=loadInvestments();
  const all=[...trades,...invs];
  const rows=[['Typ','Ticker','Richtung','Entry Datum','Entry Zeit','Entry Preis','Stop Loss','Take Profit','Risiko %','Risiko Betrag','Strategie','Chart Link','Exit Datum','Exit Preis','R-Ergebnis','% PnL','Exit Notizen']];
  all.forEach(p=>rows.push([p.type||'',p.ticker||'',p.direction||'',p.entryDate||'',p.entryTime||'',p.entryPrice||'',p.stopLoss||'',p.takeProfit||'',p.riskPct||'',p.riskAmt||'',p.strategy||'',p.chartLink||'',p.exitDate||'',p.exitPrice||'',p.rResult||'',p.pnlPct||'',p.exitNotes||'']));
  const csv=rows.map(r=>r.map(c=>'"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`trading-journal-${today()}.csv`;a.click();
  URL.revokeObjectURL(url);
  toast('✓ CSV Export gestartet');
}
